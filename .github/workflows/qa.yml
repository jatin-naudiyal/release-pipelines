name: QA Workflow

on:
  workflow_dispatch:
    inputs:
      head:
        description: 'Branch to merge into QA'
        required: true
        default: 'develop'
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  merge-build-deploy-qa:
    name: Merge, Tag, Release, Build, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: "0"

      - name: Merge ${{ github.event.inputs.head }} to qa
        uses: octokit/request-action@v2.0.12
        id: mergeQA
        with:
          route: POST /repos/:repository/merges
          repository: ${{ github.repository }}
          mediaType: '{"Accept": "application/vnd.github.v3+json"}'
          base: "qa"
          head: ${{ github.event.inputs.head }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.67.0
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          RELEASE_BRANCHES: qa
          DEFAULT_BUMP: ${{ github.event.inputs.bump }}

      - name: Create prerelease
        uses: octokit/request-action@v2.x
        id: createPreRelease
        with:
          route: POST /repos/:repository/releases
          repository: ${{ github.repository }}
          mediaType: '{"Accept": "application/vnd.github.v3+json"}'
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Number to ${{steps.tag.outputs.tag}} / add epoch time
        run: |
          echo "VERSION_NUM=${{steps.tag.outputs.tag}}" >> $GITHUB_ENV
          echo "EPOCH_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_NUM }}

      - name: Deploy to QA
        run: |
          echo "Deploying to QA environment..."
          echo "Using pre-release image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_NUM }}"
          # Replace with your actual deployment command
